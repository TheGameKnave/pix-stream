<div class="gallery-canvas" [class.lightbox-active]="lightboxOpen()" #canvas>
  @if (siteConfig.config()?.watermark) {
    <img [src]="siteConfig.config()!.watermark" alt="" class="gallery-watermark" />
  }
  @if (loading()) {
    <div class="gallery-loading">Loading...</div>
  } @else if (empty()) {
    <div class="gallery-empty">No images found.</div>
  } @else {
    <div class="river-inner">
      @for (card of cards(); track card.uid) {
        <div
          class="river-card"
          role="button"
          tabindex="0"
          [attr.aria-label]="'View photo ' + (card.entry.title || card.entry.id)"
          [class.exiting]="card.exiting"
          [style.left.px]="card.x"
          [style.top.px]="card.y"
          [style.width.px]="card.w"
          [style.height.px]="card.h"
          [style.z-index]="card.zIndex"
          [style.transform]="'translate(var(--dx,0px),var(--dy,0px)) rotate(' + card.rotation + 'deg)'"
          [attr.data-rotation]="card.rotation"
          [style.box-shadow]="card.shadow"
          (pointerdown)="onPointerDown($event)"
          (click)="onCardClick($event, card, $index)"
          (keydown.enter)="openLightbox(card, $index)"
          (keydown.space)="openLightbox(card, $index); $event.preventDefault()"
        >
          <img [src]="card.entry._displayThumb || card.entry.thumb" [alt]="card.entry.id" loading="lazy" />
        </div>
      }
    </div>
    <div
      class="lightbox-curtain"
      [style.pointer-events]="lightboxOpen() ? 'auto' : 'none'"
      (click)="closeLightbox()"
      aria-hidden="true"
    ></div>
  }
</div>
