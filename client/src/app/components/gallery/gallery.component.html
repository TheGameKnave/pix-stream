<div class="gallery-canvas" [class.lightbox-active]="lightboxOpen()" #canvas>
  @if (siteConfig.config()?.watermark) {
    <img [src]="siteConfig.config()!.watermark" alt="" class="gallery-watermark" />
  }
  @if (loading()) {
    <div class="gallery-loading">Loading...</div>
  } @else if (empty()) {
    <div class="gallery-empty">No images found.</div>
  } @else {
    <div class="river-inner">
      @for (card of cards(); track card.uid) {
        <div
          class="river-card"
          role="button"
          tabindex="0"
          [attr.aria-label]="'View photo ' + (card.entry.title || card.entry.id)"
          [class.exiting]="card.exiting"
          [hidden]="card.entry.nsfw && !siteConfig.nsfwBlur() && !connectivity.isOnline()"
          [style.left.px]="card.x"
          [style.top.px]="card.y"
          [style.width.px]="card.w"
          [style.height.px]="card.h"
          [style.z-index]="card.zIndex"
          [style.transform]="'rotate(' + card.rotation + 'deg)'"
          [attr.data-rotation]="card.rotation"
          [style.box-shadow]="card.shadow"
          (pointerdown)="onPointerDown($event)"
          (click)="onCardClick($event, card, $index)"
          (keydown.enter)="openLightbox(card, $index)"
          (keydown.space)="openLightbox(card, $index); $event.preventDefault()"
        >
          <img [src]="card.entry.nsfw && siteConfig.nsfwBlur() && card.entry.thumbBlur ? card.entry.thumbBlur : card.entry.thumb" [alt]="card.entry.id" loading="lazy" />
        </div>
      }
    </div>
    <div
      class="lightbox-curtain"
      [style.pointer-events]="lightboxOpen() ? 'auto' : 'none'"
      (click)="closeLightbox()"
      aria-hidden="true"
    ></div>
  }
  @if (nsfwPromptOpen()) {
    <div class="nsfw-prompt-overlay" (click)="dismissNsfwPrompt()" (keydown.enter)="dismissNsfwPrompt()" tabindex="0" role="dialog" aria-modal="true" aria-label="Content warning">
      <div class="nsfw-prompt" (click)="$event.stopPropagation()" (keydown.enter)="$event.stopPropagation()" tabindex="-1">
        <p>This image is marked NSFW.</p>
        <div class="nsfw-prompt-actions">
          <button class="nsfw-prompt-btn primary" (click)="disableNsfwAndOpen()">Disable Work-Safe &amp; View</button>
          <button class="nsfw-prompt-btn" (click)="dismissNsfwPrompt()">Cancel</button>
        </div>
      </div>
    </div>
  }
</div>
