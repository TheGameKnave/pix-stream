<div class="gallery-canvas" #canvas>
  @if (loading()) {
    <div class="gallery-loading">Loading...</div>
  } @else if (cards().length === 0) {
    <div class="gallery-empty">No images yet. Add photos to get started.</div>
  } @else {
    <div class="river-inner">
      @for (card of cards(); track $index) {
        <div
          class="river-card"
          [class.nsfw-blur]="card.entry.nsfw"
          [style.left.px]="card.x"
          [style.top.px]="card.y"
          [style.width.px]="card.w"
          [style.height.px]="card.h"
          [style.z-index]="card.zIndex"
          [style.transform]="'rotate(' + card.rotation + 'deg)'"
          [style.box-shadow]="card.shadow"
          (pointerdown)="onPointerDown($event)"
          (pointermove)="onPointerMove()"
          (pointerup)="onPointerUp($event, card, $index)"
        >
          <img [src]="card.entry.thumb" [alt]="card.entry.id" loading="lazy" />
        </div>
      }
    </div>
    <div
      class="lightbox-curtain"
      [style.pointer-events]="lightboxOpen() ? 'auto' : 'none'"
      (click)="closeLightbox()"
    ></div>
  }
</div>
