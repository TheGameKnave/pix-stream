name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: cd client && npx tsc --noEmit

      - name: Run client tests
        run: cd client && npm test

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: gd, exif, curl

      - name: Download PHPUnit
        run: curl -sSL https://phar.phpunit.de/phpunit-11.phar -o server/phpunit.phar

      - name: Run PHP tests
        run: cd server && php phpunit.phar --testdox

      - name: Build client
        run: cd client && npm run build
